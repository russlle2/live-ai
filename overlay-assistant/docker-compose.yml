services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: overlay
      POSTGRES_PASSWORD: overlay
      POSTGRES_DB: overlay
    ports:
      - "5432:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data

  # Optional GUI
  pgadmin:
    image: dpage/pgadmin4:8
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
