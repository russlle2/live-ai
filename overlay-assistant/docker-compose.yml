name: live-rhetoric

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: overlay
      POSTGRES_PASSWORD: overlay
      POSTGRES_DB: overlay
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overlay -d overlay"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
    env_file:
      - path: ../.env.local
        required: false
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      DATABASE_URL: postgres://overlay:overlay@db:5432/overlay
      WEB_ORIGIN: "${COMPOSE_WEB_ORIGIN:-http://localhost:8080}"
      ALLOW_INSECURE_DEMO_AUTH: "false"
      PERSONAL_MEMORY_PATH: /app/data/private/personal_memory.local.json
      SESSION_LOG_DIR: /app/data/private/sessions
      SPEAKER_SERVICE_URL: http://speaker:8791
    command: ["sh", "-c", "node apps/server/dist/db/migrate.js && exec node apps/server/dist/index.js"]
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    # Match the owner of the host private-data directory on Linux. Set these
    # once in ../.env.local (`id -u` / `id -g`); Docker Desktop normally uses
    # the 1000:1000 defaults successfully.
    user: "${LIVE_AI_UID:-1000}:${LIVE_AI_GID:-1000}"
    volumes:
      - ./data/private:/app/data/private
    depends_on:
      db:
        condition: service_healthy
      speaker:
        condition: service_healthy
    restart: unless-stopped

  speaker:
    build:
      context: ./services/speaker
    environment:
      LIVE_AI_PRIVATE_DATA_DIR: /data/private/speaker
      HF_HOME: /models/huggingface
      SPEAKER_SERVICE_API_TOKEN: "${SPEAKER_SERVICE_API_TOKEN:-}"
      SPEAKER_MODEL_ID: "${SPEAKER_MODEL_ID:-anton-l/wav2vec2-base-superb-sv}"
      SPEAKER_MODEL_REVISION: "${SPEAKER_MODEL_REVISION:-eb0be47779dda10620d068ab579fca970ee7e417}"
      SPEAKER_OWNER_THRESHOLD: "${SPEAKER_OWNER_THRESHOLD:-0.90}"
      SPEAKER_MIN_ENROLLMENT_SAMPLES: "${SPEAKER_MIN_ENROLLMENT_SAMPLES:-3}"
    volumes:
      - speaker_private:/data/private/speaker
      - speaker_models:/models
    restart: unless-stopped

volumes:
  speaker_private:
  speaker_models:
