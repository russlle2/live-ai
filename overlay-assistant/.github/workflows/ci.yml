name: CI

on:
  push:
    branches: [main]
    paths: ["overlay-assistant/**"]
  pull_request:
    branches: [main]
    paths: ["overlay-assistant/**"]

defaults:
  run:
    working-directory: overlay-assistant

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm run build -w packages/shared

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run tests (protocol lock + sanitizer)
        run: pnpm run test

      - name: Verify protocol lock tests exist
        run: |
          test -f packages/shared/test/protocol_lock_v1.test.ts || (echo "FAIL: protocol lock test missing" && exit 1)
          echo "Protocol lock test file present ✓"
